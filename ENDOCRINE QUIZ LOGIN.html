<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Login - Secure Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .lock-icon {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #c33;
        }
        
        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #999;
            font-size: 12px;
        }
        
        .security-badge {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }
        
        .security-badge::before {
            content: "🔒 ";
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="lock-icon">🔐</div>
        <h1>Secure Quiz Access</h1>
        <p class="subtitle">Enter your credentials to access the quiz</p>
        
        <form id="loginForm" onsubmit="return validateLogin(event)">
            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input 
                    type="text" 
                    id="studentId" 
                    name="studentId" 
                    placeholder="Enter your Student ID"
                    required
                    autocomplete="off"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                    autocomplete="off"
                >
            </div>
            
            <button type="submit">🚀 Access Quiz</button>
            
            <div id="errorMessage" class="error-message">
                ❌ Invalid Student ID or Password. Please try again.
            </div>
        </form>
        
        <div class="security-badge">
            This quiz is protected. Only authorized students can access.
        </div>
        
        <div class="footer">
            Please contact your instructor if you have issues logging in.
        </div>
    </div>
    
    <script>
        // Valid credentials (encrypted in production)
        const validCredentials = {"450": "0909", "460": "0880", "470": "1234"};
        
        // Quiz form URL
        const quizUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdKPP3p2ePGWwhAw-B9DzKFtDS3MkTU14wxvyn3JjpaoPiAng/viewform?usp=header";
        
        function validateLogin(event) {
            event.preventDefault();
            
            const studentId = document.getElementById('studentId').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            
            // Remove previous error
            errorMsg.classList.remove('show');
            
            // Validate credentials
            if (validCredentials[studentId] && validCredentials[studentId] === password) {
                // SUCCESS - Redirect to quiz
                console.log('Login successful for student:', studentId);
                
                // Add student ID to form URL as parameter (optional)
                const urlWithId = quizUrl + (quizUrl.includes('?') ? '&' : '?') + 'studentId=' + encodeURIComponent(studentId);
                
                // Redirect to Google Form
                window.location.href = urlWithId;
            } else {
                // FAILED - Show error
                errorMsg.classList.add('show');
                
                // Clear password field
                document.getElementById('password').value = '';
                
                // Log failed attempt (optional - for tracking)
                console.log('Failed login attempt for ID:', studentId);
            }
            
            return false;
        }
        
        // Optional: Prevent back button after successful login
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
